              <TH k="p">Price</TH>
              <TH k="wg">Wt</TH>
              <TH k="mm">mm</TH>
              <TH k="wr">WR</TH>
              <th style={{padding:"5px 2px",fontSize:7,fontWeight:700,color:"#4a5568",background:"#12121f",position:"sticky",top:0,zIndex:2}}>Mat</th>
              {C.map(c=><TH key={c.k} k={c.k==="wgt"?"ws":c.k}>{c.a}</TH>)}
            </tr></thead>
            <tbody>
            {paged.map((w,i)=>{
              const sc=w.ns>=8?"#22c55e":w.ns>=7.5?"#a3e635":w.ns>=7?"#eab308":w.ns>=6.5?"#f97316":"#64748b";
              const isEx=ex===w.id;
              const wcol=w.wg<=70?"#22c55e":w.wg<=90?"#a3e635":w.wg<=110?"#eab308":w.wg<=135?"#f97316":"#ef4444";
              return(<React.Fragment key={w.id}>
                <tr onClick={()=>setEx(isEx?null:w.id)} style={{cursor:"pointer",borderBottom:"1px solid #13132a",background:isEx?"#1e1040":"transparent",animation:i<30?"fadeIn .2s ease":"none",animationDelay:(i*10)+"ms",animationFillMode:"backwards"}}>
                  <td style={{padding:"2px 2px"}}><Img b={w.b} m={w.m} r={w.r}/></td><td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:9.5,fontWeight:700,color:sc}}>{w.ns.toFixed(2)}</td>
                  {showOrig&&<td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:"#64748b"}}>{w.os.toFixed(2)}</td>}
                  {showOrig&&<td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:w.d>0?"#22c55e":w.d<0?"#ef4444":"#4a5568"}}>{w.d>0?"+":""}{w.d.toFixed(2)}</td>}
                  {showOrig&&<td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:w.rc>0?"#22c55e":w.rc<0?"#ef4444":"#4a5568"}}>{w.rc>0?"+"+w.rc:w.rc}</td>}
                  <td style={{padding:"4px 2px",fontSize:8,color:"#94a3b8",fontWeight:600,whiteSpace:"nowrap"}}>{w.b}</td>
                  <td style={{padding:"4px 2px",fontSize:8,color:"#cbd5e1",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.m}</td>
                  <td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:"#e2e8f0"}}>{f(w.p)}</td>
                  <td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:wcol}}>{w.wg}g</td>
                  <td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:"#64748b",textAlign:"center"}}>{w.mm}</td>
                  <td style={{padding:"4px 2px",fontFamily:"'JetBrains Mono'",fontSize:8,color:w.wr>=200?"#22c55e":w.wr>=100?"#a3e635":w.wr>=50?"#eab308":w.wr>0?"#f97316":"#475569"}}>{w.wr?w.wr+"m":"--"}</td>
                  <td style={{padding:"4px 2px",fontSize:7.5,color:"#64748b",whiteSpace:"nowrap"}}>{w.mat}</td>
                  {C.map(c=>{
                    const v=c.k==="wgt"?w.ws:(w.s[c.k]||0);
                    return <td key={c.k} style={{padding:"4px 1px"}}><SB v={v}/></td>;
                  })}
                </tr>
                {isEx&&<tr><td colSpan={showOrig?17+C.length:13+C.length} style={{padding:"8px 10px",background:"#1e1040",borderBottom:"2px solid #8b5cf6"}}>
                  <div style={{fontSize:9,lineHeight:1.7,color:"#94a3b8"}}>
                    <div style={{fontWeight:700,color:"#f1f5f9",fontSize:10,marginBottom:3}}>{w.b} {w.m} <span style={{color:"#64748b",fontWeight:400}}>Ref. {w.r}</span></div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:4}}>
                      <span>Price: <b style={{color:"#e2e8f0"}}>{f(w.p)}</b></span>
                      <span>Weight: <b style={{color:wcol}}>{w.wg}g</b> ({Math.round(w.wg/67*100)}% of Apple Watch)</span>
                      <span>New: <b style={{color:sc}}>{w.ns.toFixed(2)}</b></span>
                      <span>Orig: <b style={{color:"#64748b"}}>{w.os.toFixed(2)}</b></span>
                      <span>Delta: <b style={{color:w.d>0?"#22c55e":"#ef4444"}}>{w.d>0?"+":""}{w.d.toFixed(2)}</b></span>
                      <span>Rank change: <b style={{color:w.rc>0?"#22c55e":"#ef4444"}}>{w.rc>0?"+":""}{w.rc}</b></span>
                      <span>Source: <b>{w.src}</b></span>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3}}>
                      {C.map(c=>{
                        const v=c.k==="wgt"?w.ws:(w.s[c.k]||0);
                        return <span key={c.k} style={{fontSize:8}}><span style={{color:v>=8?"#22c55e":v>=6?"#eab308":"#64748b",fontFamily:"'JetBrains Mono'",fontWeight:600}}>{c.a}:{v}</span><span style={{color:"#2d2d4a"}}> ({Math.round(c.w*100)}%)</span></span>;
                      })}
                    </div>
                    {w.n&&<div style={{fontSize:8,color:"#4a5568",fontStyle:"italic",marginTop:2}}>{w.n.substring(0,200)}</div>}
                    <div style={{display:"flex",gap:6,marginTop:6}}>
                      <a href={gUrl(w.b,w.m,w.r)} target="_blank" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#1e1e36",color:"#8b5cf6",padding:"4px 10px",borderRadius:4,fontSize:8,fontWeight:600,textDecoration:"none",border:"1px solid #2d2d4a",cursor:"pointer",fontFamily:"'Outfit'"}}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
                        Images
                      </a>
                      <a href={gTxt(w.b,w.m,w.r)} target="_blank" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#1e1e36",color:"#a3e635",padding:"4px 10px",borderRadius:4,fontSize:8,fontWeight:600,textDecoration:"none",border:"1px solid #2d2d4a",cursor:"pointer",fontFamily:"'Outfit'"}}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
                        Google
                      </a>
                      <a href={"https://www.chrono24.com/search/index.htm?query="+encodeURIComponent(w.b+" "+w.m)} target="_blank" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#1e1e36",color:"#f59e0b",padding:"4px 10px",borderRadius:4,fontSize:8,fontWeight:600,textDecoration:"none",border:"1px solid #2d2d4a",cursor:"pointer",fontFamily:"'Outfit'"}}>
                        Chrono24
                      </a>
                    </div>
                  </div>
                </td></tr>}
              </React.Fragment>);
            })}
            </tbody>
          </table>
        </div>
        {pages>1&&<div style={{display:"flex",gap:3,marginTop:6,justifyContent:"center",flexWrap:"wrap"}}>
          {Array.from({length:pages},(_,i)=>(
            <button key={i} onClick={()=>setPage(i)} style={{background:page===i?"#5b21b6":"#12121f",color:page===i?"white":"#4a5568",border:"1px solid "+(page===i?"#8b5cf6":"#2d2d4a"),borderRadius:3,padding:"3px 8px",fontSize:8,cursor:"pointer",fontFamily:"'JetBrains Mono'"}}>{i*PER+1}-{Math.min((i+1)*PER,sorted.length)}</button>
          ))}
        </div>}
        <div style={{marginTop:6,padding:"5px 8px",background:"#12121f",borderRadius:5,border:"1px solid #1e1e36",fontSize:8,color:"#4a5568",display:"flex",gap:10,flexWrap:"wrap"}}>
          <span>13 criteria: MvC 16%, Deal 13%, Her 10%, Enj 7%, Soul 8%, Rar 8%, Sprts 7%, Prv 7%, Res 7%, <b style={{color:"#8b5cf6"}}>Wgt 5%</b>, VDn 4%, Mkt 4%, Svc 4%</span>
          <span>Weight: <span style={{color:"#22c55e"}}>green</span> &lt;70g, <span style={{color:"#a3e635"}}>lime</span> &lt;90g, <span style={{color:"#eab308"}}>yellow</span> &lt;110g, <span style={{color:"#f97316"}}>orange</span> &lt;135g, <span style={{color:"#ef4444"}}>red</span> &gt;135g</span>
          <span>"Show Orig" reveals original score, delta, and rank change from adding weight</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
